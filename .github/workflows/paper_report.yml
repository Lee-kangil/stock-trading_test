name: Paper + Report

on:
  schedule:
    # 마감 후 여러 번 시도 — GitHub cron 누락 대비.
    # multi_paper.py 멱등성 가드로 실제 갱신은 그날 '한 번만'.
    - cron: "5 7 * * 1-5"    # 16:05 KST
    - cron: "30 7 * * 1-5"   # 16:30 KST
    - cron: "10 8 * * 1-5"   # 17:10 KST
    - cron: "0 10 * * 1-5"   # 19:00 KST (백업)
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: trading
  cancel-in-progress: false

jobs:
  paper:
    runs-on: ubuntu-latest
    env:
      PYTHONUTF8: "1"
      KIS_ENV: paper
      KIS_APP_KEY: ${{ secrets.KIS_APP_KEY }}
      KIS_APP_SECRET: ${{ secrets.KIS_APP_SECRET }}
      KIS_ACCOUNT: ${{ secrets.KIS_ACCOUNT }}
      KIS_PRODUCT: ${{ secrets.KIS_PRODUCT }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -r requirements.txt
      - name: Run local 5-strategy paper (재시도 3회)
        run: |
          for i in 1 2 3; do
            python -u src/multi_paper.py && break
            echo "[재시도] $i회차 실패 — 30초 후 다시 시도"; sleep 30
          done
      - name: Build report
        run: python -u src/report.py
      - name: Publish report to GitHub Pages (docs/)
        run: |
          mkdir -p docs
          touch docs/.nojekyll
          cp data/report_latest.html docs/index.html || true
          cp data/report_*.html docs/ 2>/dev/null || true
      - name: Persist state + report
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git pull --rebase --autostash || true
          git add -f data/multi_paper_state.json data/multi_paper_log.csv docs/ || true
          git commit -m "paper+report $(date -u +%F)" || echo "no changes"
          git push || true
