name: KIS Mock Trade

on:
  schedule:
    # 장중(09:00~15:30 KST) 여러 번 시도 — GitHub cron 누락 대비.
    # 멱등성 가드(run_live.py)로 실제 주문은 그날 '한 번만' 일어남.
    - cron: "30 5 * * 1-5"   # 14:30 KST
    - cron: "55 5 * * 1-5"   # 14:55 KST
    - cron: "15 6 * * 1-5"   # 15:15 KST
  workflow_dispatch:          # 수동 실행 버튼

permissions:
  contents: write

concurrency:
  group: trading
  cancel-in-progress: false

jobs:
  trade:
    runs-on: ubuntu-latest
    env:
      KIS_ENV: paper
      KIS_APP_KEY: ${{ secrets.KIS_APP_KEY }}
      KIS_APP_SECRET: ${{ secrets.KIS_APP_SECRET }}
      KIS_ACCOUNT: ${{ secrets.KIS_ACCOUNT }}
      KIS_PRODUCT: ${{ secrets.KIS_PRODUCT }}
      KIS_LIVE: ${{ vars.KIS_LIVE }}     # 0=시뮬, 1=실제 모의주문 (저장소 Variables)
      PYTHONUTF8: "1"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -r requirements.txt
      - name: Run KIS strategy (재시도 3회)
        run: |
          for i in 1 2 3; do
            python -u src/run_live.py && break
            echo "[재시도] $i회차 실패 — 30초 후 다시 시도"; sleep 30
          done
      - name: Persist state
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git pull --rebase --autostash || true
          git add -f data/live_state.json || true
          git commit -m "kis run $(date -u +%F_%H%M)" || echo "no changes"
          git push || true
